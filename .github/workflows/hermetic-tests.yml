name: Hermetic tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  hermetic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run stdlib-only hermetic tier
        run: python scripts/run_test_tier.py hermetic --verbosity 2
