name: Hermetic tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  hermetic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Require engineering agent trailer
        if: github.event_name == 'push'
        shell: bash
        run: |
          if ! git log -1 --format=%B HEAD | grep -Eq '^Agent: [^[:space:]].+$'; then
            echo 'HEAD must include an Agent: model/version commit trailer.' >&2
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run stdlib-only hermetic tier
        run: python scripts/run_test_tier.py hermetic --verbosity 2
